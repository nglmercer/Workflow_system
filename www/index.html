<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow System - WASM Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { color: #e94560; margin-bottom: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #0f3460; }
        .panel h2 { color: #e94560; margin-bottom: 15px; font-size: 1.2em; }
        textarea { width: 100%; height: 200px; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; padding: 10px; font-family: 'Fira Code', monospace; font-size: 13px; resize: vertical; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 10px; margin-top: 10px; }
        button:hover { background: #c73e54; }
        button.secondary { background: #533483; }
        button.secondary:hover { background: #6a42a0; }
        .output { background: #0f3460; border-radius: 4px; padding: 15px; margin-top: 15px; font-family: 'Fira Code', monospace; font-size: 13px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .status { padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .status.ok { background: #2ecc71; color: #000; }
        .status.error { background: #e74c3c; color: #fff; }
        .status.loading { background: #f39c12; color: #000; }
        .row { display: flex; gap: 20px; }
        .row > * { flex: 1; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input { width: 100%; padding: 8px; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Workflow System - WASM Demo</h1>
        <div id="status" class="status loading">Loading WASM...</div>

        <div class="panel">
            <h2>Rules (YAML)</h2>
            <textarea id="rulesYaml">- id: welcome-user
  on: USER_REGISTERED
  do:
    type: log_message
    params:
      message: "New user: ${data.userId}"

- id: premium-welcome
  on: USER_REGISTERED
  if:
    field: data.plan
    operator: EQ
    value: premium
  do:
    - type: log_message
      params:
        message: "Premium user: ${data.userId}"
        level: info
    - type: set_var
      params:
        key: type
        value: premium</textarea>
            <button onclick="loadRules()">Load Rules</button>
            <button class="secondary" onclick="exportJson()">Export JSON</button>
            <button class="secondary" onclick="exportYaml()">Export YAML</button>
        </div>

        <div class="row">
            <div class="panel">
                <h2>Event</h2>
                <label>Event Name</label>
                <input type="text" id="eventName" value="USER_REGISTERED">
                <label>Event Data (JSON)</label>
                <textarea id="eventData" style="height: 100px;">{"userId": "user123", "plan": "premium", "email": "user@example.com"}</textarea>
                <button onclick="processEvent()">Process Event</button>
            </div>

            <div class="panel">
                <h2>Results</h2>
                <div id="results" class="output">Click "Process Event" to see results...</div>
            </div>
        </div>

        <div class="panel">
            <h2>Validation</h2>
            <button onclick="validateRules()">Validate Rules</button>
            <div id="validation" class="output">Click "Validate Rules" to check...</div>
        </div>
    </div>

    <script type="module">
        import init, { WasmRuleEngine, load_rules_from_yaml, export_rules_to_json, export_rules_to_yaml, validate_rules } from '../pkg/workflow_wasm.js';

        let engine = null;
        let currentRules = null;

        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const validationEl = document.getElementById('validation');

        try {
            await init();
            statusEl.textContent = 'WASM Loaded';
            statusEl.className = 'status ok';
        } catch (e) {
            statusEl.textContent = 'WASM Load Failed: ' + e.message;
            statusEl.className = 'status error';
        }

        window.loadRules = async function() {
            try {
                const yaml = document.getElementById('rulesYaml').value;
                currentRules = load_rules_from_yaml(yaml);

                engine = new WasmRuleEngine(JSON.stringify({
                    rules: currentRules,
                    global_settings: { debug_mode: true, evaluate_all: true, strict_actions: false }
                }));

                resultsEl.textContent = `Loaded ${currentRules.length} rule(s) successfully!`;
            } catch (e) {
                resultsEl.textContent = 'Error loading rules: ' + e.message;
            }
        };

        window.processEvent = async function() {
            if (!engine) {
                resultsEl.textContent = 'Please load rules first!';
                return;
            }

            try {
                const eventName = document.getElementById('eventName').value;
                const eventData = document.getElementById('eventData').value;

                const results = await engine.processEventSimple(eventName, eventData, null);
                resultsEl.textContent = JSON.stringify(results, null, 2);
            } catch (e) {
                resultsEl.textContent = 'Error: ' + e.message;
            }
        };

        window.exportJson = function() {
            if (!currentRules) {
                resultsEl.textContent = 'No rules loaded!';
                return;
            }
            const json = export_rules_to_json(JSON.stringify(currentRules));
            resultsEl.textContent = json;
        };

        window.exportYaml = function() {
            if (!currentRules) {
                resultsEl.textContent = 'No rules loaded!';
                return;
            }
            const yaml = export_rules_to_yaml(JSON.stringify(currentRules));
            resultsEl.textContent = yaml;
        };

        window.validateRules = function() {
            if (!currentRules) {
                validationEl.textContent = 'No rules loaded!';
                return;
            }
            const result = validate_rules(JSON.stringify(currentRules));
            validationEl.textContent = JSON.stringify(result, null, 2);
        };

        // Auto-load rules on page load
        window.loadRules();
    </script>
</body>
</html>
